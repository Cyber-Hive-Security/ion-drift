# Ion Drift — Build from Source
#
# Builds the Docker image locally instead of pulling the pre-built image.
# Requires 4+ vCPU and 4+ GB RAM. See README for full requirements.
#
# Usage (standalone):
#   docker compose -f docker-compose.build.yml up -d
#
# Usage (with overrides for custom ports/volumes):
#   docker compose -f docker-compose.build.yml -f docker-compose.override.yml up -d

services:
  ion-drift:
    build: .
    container_name: ion-drift
    hostname: ion-drift
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "3000:3000"
      - "5514:5514/udp"
    environment:
      - RUST_LOG=info,tower_http=warn,hyper=warn,maxminddb=warn,reqwest=warn,rustls=warn,hyper_util=warn
      - XDG_DATA_HOME=/app/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ion-drift-data:/app/data

volumes:
  ion-drift-data:
