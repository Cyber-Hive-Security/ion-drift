services:
  ion-drift:
    build: .
    container_name: ion-drift
    hostname: hiverouter
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "3100:3000"
      - "5514:5514/udp"
    environment:
      - RUST_LOG=info,mikrotik_core::swos_client=debug
      - XDG_DATA_HOME=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ion-drift-data:/app/data

volumes:
  ion-drift-data:
