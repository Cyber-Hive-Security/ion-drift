services:
  ion-drift:
    build: .
    container_name: ion-drift
    hostname: ion-drift
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "3100:3000"
      - "5514:5514/udp"
    environment:
      - RUST_LOG=info,tower_http=warn,hyper=warn,maxminddb=warn,reqwest=warn,rustls=warn,hyper_util=warn
      - XDG_DATA_HOME=/app/data
      - TOPOLOGY_INFERENCE_MODE=active
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ion-drift-data:/app/data
      - ./config/production.toml:/app/config/server.toml:ro
      - ./certs/root_ca.crt:/app/certs/root_ca.crt:ro

volumes:
  ion-drift-data:
