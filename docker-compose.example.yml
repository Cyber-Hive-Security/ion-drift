# Ion Drift — Docker Compose
#
# Quick start:
#   docker compose up -d
#
# The setup wizard runs on first launch — no config needed.
# For OIDC or advanced config, see docs/configuration.md.
#
# To build from source instead, use docker-compose.build.yml:
#   docker compose -f docker-compose.build.yml up -d
# (Requires 4+ vCPU and 4+ GB RAM — see README for details)

services:
  ion-drift:
    image: ghcr.io/cyber-hive-security/ion-drift:latest
    container_name: ion-drift
    restart: unless-stopped
    cap_add:
      - NET_RAW
      - NET_ADMIN
    ports:
      - "3000:3000"
      - "5514:5514/udp"
    environment:
      - RUST_LOG=info,tower_http=warn,hyper=warn,maxminddb=warn,reqwest=warn,rustls=warn,hyper_util=warn
      - XDG_DATA_HOME=/app/data
      # Router credentials are configured through the setup wizard and stored
      # encrypted — do NOT add DRIFT_ROUTER_PASSWORD here. See docs/configuration.md.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    volumes:
      - ion-drift-data:/app/data
      # Uncomment for custom config (optional — setup wizard handles first-run):
      # - ./config/server.toml:/app/config/server.toml:ro
      # Uncomment if your router/OIDC provider uses a private CA:
      # - ./certs/root_ca.crt:/app/certs/root_ca.crt:ro

volumes:
  ion-drift-data:
