[server]
listen_addr = "0.0.0.0"
# When running in Docker, keep this at 3000. Use Docker port mapping
# (e.g. "3100:3000" in docker-compose.yml) to change the external port.
listen_port = 3000
# Optional: home location for the world map. If set, arcs originate from here
# and the home country is highlighted green. If omitted, no home marker is shown
# and all data points are displayed without suppression.
# home_lon = 142.20
# home_lat = 11.35
# home_country = "US"
# Monitored regions — country codes highlighted on the world map (ISO 3166-1 alpha-2).
# Default: [] (none). Configure via Settings > Monitored Regions in the UI.
# warning_countries = ["RU", "CN"]

[router]
# Router IP or hostname (REQUIRED for production; default: 192.168.88.1 = Mikrotik factory default)
# Override: DRIFT_ROUTER_HOST env var
host = "192.168.88.1"
# RouterOS REST API port. This MUST be 443 (HTTPS).
# ⚠ Do NOT use port 8728 or 8729 — those are the RouterOS proprietary API (Winbox/API),
# which speaks a completely different protocol. Ion Drift uses the REST API only.
port = 443
tls = true
# Path to your CA certificate if the router uses a private/internal CA.
# Only set this if your router uses a certificate signed by a private CA (Smallstep, EJBCA, etc.).
# Leave commented out for Let's Encrypt or other publicly trusted certificates.
# ca_cert_path = "/app/certs/root_ca.crt"
# Username for the RouterOS REST API. Create a dedicated read-only user — do not use "admin".
# Password is configured through the setup wizard and stored encrypted — no env var needed.
username = "ion-drift"
wan_interface = "1-WAN"
# Internal DNS server IP for PTR lookups (optional; falls back to system resolver)
# Override: DRIFT_ROUTER_DNS_SERVER env var
# dns_server = "192.168.1.1"

# ── Authentication ─────────────────────────────────────────────────
# By default, ion-drift uses local auth (username/password). The setup wizard
# creates an admin account on first run. No external IdP is required.
#
# To enable OIDC (Keycloak, Authentik, Authelia, etc.), uncomment the [oidc]
# section below. Both local auth and OIDC can be used simultaneously.

# [oidc]
# issuer_url = "https://your-idp.example.com/realms/YourRealm"
# client_id = "ion-drift"
# # client_secret from DRIFT_OIDC_SECRET env var (legacy mode only)
# redirect_uri = "https://your-ion-drift.example.com/auth/callback"
# # CA cert for verifying your OIDC provider's TLS cert (optional)
# # ca_cert_path = "/path/to/ca.crt"
# # Claim path for roles in the ID token (dot-notation for nested claims)
# # Default: "realm_access.roles" (Keycloak). Use "groups" for Authentik/Authelia.
# # roles_claim = "realm_access.roles"
# # Role/group name that grants admin access (default: "ion-drift-admin")
# # admin_role = "ion-drift-admin"

[session]
# Session secret is auto-generated and stored encrypted by the setup wizard.
# Only set DRIFT_SESSION_SECRET env var if using OIDC without mTLS bootstrap.
cookie_name = "ion_drift_session"
max_age_seconds = 86400
# Set to true only if accessing Ion Drift over HTTPS (direct or via reverse proxy).
# When false, session cookies work over plain HTTP. When true, browsers silently
# reject cookies on HTTP connections — login appears to succeed but the session
# is never stored.
secure = false
same_site = "lax"

# ── mTLS Bootstrap (Keycloak-only, advanced) ────────────────────
# Uncomment the sections below to enable mTLS KEK bootstrap + CertWarden cert management.
# With bootstrap enabled, the KEK is retrieved from Keycloak via mTLS instead of derived
# from the admin password. Only needed for Keycloak deployments that want mTLS-based KEK.

# [oidc.bootstrap]
# client_id = "ion-drift-bootstrap"
# token_url = "https://your-keycloak.example.com/realms/YourRealm/protocol/openid-connect/token"
# admin_url = "https://your-keycloak.example.com/admin/realms/YourRealm"
# kek_attribute = "ion_drift_kek"

# [tls]
# client_cert = "/app/data/certs/client.crt"
# client_key = "/app/data/certs/client.key"

# [certwarden]
# base_url = "https://your-certwarden.example.com:4051/certwarden"
# cert_name = "your-cert-name"
# renewal_threshold_days = 30
# check_interval_hours = 1

# [syslog]
# port = 5514
# bind_address = "0.0.0.0"
# target_ip = "192.168.1.100"  # IP of this server as seen by the router
