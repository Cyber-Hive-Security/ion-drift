[server]
listen_addr = "0.0.0.0"
listen_port = 3000

[router]
host = "router.kaziik.xyz"
port = 443
tls = true
ca_cert_path = "/app/certs/root_ca.crt"
username = "ion-drift"

[oidc]
issuer_url = "https://holonetid.kaziik.xyz:8443/realms/TheHolonet"
client_id = "ion-drift"
redirect_uri = "https://hiverouter.kaziik.xyz/auth/callback"
ca_cert_path = "/app/certs/root_ca.crt"

[oidc.bootstrap]
client_id = "ion-drift-bootstrap"
token_url = "https://holonetid.kaziik.xyz:8443/realms/TheHolonet/protocol/openid-connect/token"
admin_url = "https://holonetid.kaziik.xyz:8443/admin/realms/TheHolonet"

[tls]
client_cert = "/app/data/certs/client.crt"
client_key = "/app/data/certs/client.key"

[certwarden]
base_url = "https://certwarden.kaziik.xyz:4051"
cert_name = "hiverouter"
renewal_threshold_days = 30
check_interval_hours = 1

[session]
cookie_name = "ion_drift_session"
max_age_seconds = 86400
secure = true
same_site = "lax"
