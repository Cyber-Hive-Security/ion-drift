[router]
# Router IP or hostname (default: 192.168.88.1 = Mikrotik factory default)
# Override: --host flag or DRIFT_ROUTER_HOST env var
host = "192.168.88.1"
port = 443
tls = true
# ca_cert_path = "/path/to/ca.crt"
username = "admin"
# password is read from DRIFT_ROUTER_PASSWORD env var or --password flag
