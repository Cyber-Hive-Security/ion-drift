[package]
name = "ion-drift-web"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Web server for Mikrotik RouterOS management dashboard"

[[bin]]
name = "ion-drift-web"
path = "src/main.rs"

[dependencies]
mikrotik-core = { path = "../mikrotik-core" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

